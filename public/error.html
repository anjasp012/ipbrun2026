<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Sedang Padat - IPB RUN 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #003366;
            --accent: #FF7A21;
            --bg: #f8fafc;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--primary);
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            position: relative;
        }

        /* Abstract Background Decoration */
        .blob {
            position: absolute;
            z-index: -1;
            filter: blur(60px);
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            width: 300px;
            height: 300px;
            background: var(--primary);
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            width: 250px;
            height: 250px;
            background: var(--accent);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(0, 0) rotate(0deg); }
            to { transform: translate(50px, 50px) rotate(90deg); }
        }

        .icon-box {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 51, 102, 0.1);
            position: relative;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 20px 40px rgba(0, 51, 102, 0.1); }
            50% { transform: scale(1.05); box-shadow: 0 20px 60px rgba(0, 51, 102, 0.15); }
            100% { transform: scale(1); box-shadow: 0 20px 40px rgba(0, 51, 102, 0.1); }
        }

        .icon-box svg {
            width: 60px;
            height: 60px;
            color: var(--accent);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1.1;
        }

        p {
            font-size: 1.1rem;
            font-weight: 500;
            color: #64748b;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background-color: var(--primary);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 51, 102, 0.2);
        }

        .btn:hover {
            background-color: #002244;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 51, 102, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn svg {
            width: 18px;
            height: 18px;
            transition: transform 0.5s ease;
        }

        .btn:hover svg {
            transform: rotate(360deg);
        }

        .footer {
            margin-top: 4rem;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #cbd5e1;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            p { font-size: 1rem; }
            .icon-box { width: 100px; height: 100px; margin-bottom: 2rem; }
            .icon-box svg { width: 50px; height: 50px; }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <div class="icon-box">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
        </div>

        <h1>Web Sedang Padat</h1>
        <p>Mohon maaf, trafik saat ini sedang sangat tinggi. Silakan coba segarkan halaman untuk melanjutkan pendaftaran Anda.</p>

        <button class="btn" onclick="window.location.reload()">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
            </svg>
            Segarkan Halaman
        </button>

        <div class="footer">IPB RUN 2026 • Official Error Page</div>
    </div>
</body>
</html>
